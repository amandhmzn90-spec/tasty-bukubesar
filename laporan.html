<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Laporan — Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--surface3:#252525;
  --border:#2a2a2a;--border2:#363636;--text:#f0ede6;--muted:#777;
  --accent:#f5c842;--accent2:#e8a020;
  --mandiri:#a78bfa;--bca:#60a5fa;--cash:#f472b6;
  --saved:#4ade80;--red:#f87171;--pending:#fb923c;--green:#4ade80;
  --produksi:#f472b6;--ops:#60a5fa;
  --mono:'DM Mono',monospace;--sans:'Sora',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
nav{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;height:52px;gap:3px;}
.logo{display:flex;align-items:center;gap:8px;margin-right:auto;}
.logo-icon{width:26px;height:26px;background:var(--mandiri);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo-text{font-size:13px;font-weight:600;letter-spacing:-0.3px;}
.nl{font-family:var(--sans);font-size:11px;font-weight:500;padding:6px 9px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap;}
.nl.ext{border:1px solid var(--border2);font-size:10px;padding:5px 8px;}
.nl.ext:hover{border-color:var(--accent);color:var(--accent);}
.nl.export-btn{background:rgba(245,200,66,0.12);color:var(--accent);border:1px solid rgba(245,200,66,0.3);font-weight:600;}
.nl.export-btn:hover{background:rgba(245,200,66,0.2);}

.wrap{padding:14px;max-width:1000px;margin:0 auto;}
.tabs{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.tab{flex:1;font-family:var(--sans);font-size:12px;font-weight:600;padding:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center;}
.tab.active{background:var(--accent);color:#0c0c0c;}

.frow{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.frow::-webkit-scrollbar{display:none;}
.fbtn{font-family:var(--sans);font-size:11px;font-weight:500;padding:6px 12px;border-radius:18px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.fbtn.active{background:var(--accent);border-color:var(--accent);color:#0c0c0c;}
.dinput{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:8px;outline:none;}
.dinput:focus{border-color:var(--accent);}

.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.sum-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.cbar{height:2px;border-radius:2px;margin-bottom:8px;}
.clabel{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;}
.cval{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:-0.5px;}
.csub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono);}

.period-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.period-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.period-label{font-size:12px;font-weight:600;}
.period-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.period-saved{font-family:var(--mono);font-size:18px;font-weight:500;}
.period-saved.pos{color:var(--saved);}
.period-saved.neg{color:var(--red);}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid var(--border);}
.prow-label{font-size:11px;color:var(--muted);font-family:var(--mono);}
.prow-val{font-family:var(--mono);font-size:12px;font-weight:500;}
.prow.bold-row{border-top:1px solid var(--border2);}
.prow.bold-row .prow-label{color:var(--text);font-weight:600;}
.prow.bold-row .prow-val{font-size:13px;}
.pay-bd{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.pay-chip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;}
.pay-dot{width:6px;height:6px;border-radius:50%;}

/* Monthly layout */
.monthly-layout{display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:start;}
@media(max-width:680px){.monthly-layout{grid-template-columns:1fr;}}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.chart-title{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.chart-filter{display:flex;gap:4px;}
.cf{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;}
.cf.active{background:var(--surface2);color:var(--text);border-color:var(--border2);}
canvas{max-height:180px;}

.year-sidebar{display:flex;flex-direction:column;gap:8px;}
.year-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.year-card-label{font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:4px;}
.year-card-val{font-family:var(--mono);font-size:15px;font-weight:500;}

/* Export modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px;max-width:400px;width:100%;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-select{width:100%;font-family:var(--sans);font-size:13px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:8px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.form-select option{background:#1e1e1e;}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.exp-btn{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#0c0c0c;font-family:var(--sans);font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:4px;}
.exp-btn:hover{background:var(--accent2);}
.exp-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.close-btn{width:100%;padding:9px;border-radius:10px;background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;border:1px solid var(--border);cursor:pointer;margin-top:8px;}

.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.6s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;line-height:1.8;}
</style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-icon">📊</div><div class="logo-text">Laporan</div></div>
  <a class="nl ext" href="/">Transaksi</a>
  <a class="nl ext" href="/pengeluaran.html">Pengeluaran</a>
  <button class="nl export-btn" onclick="openExport()">⬇ Ekspor Excel</button>
</nav>

<!-- Export Modal -->
<div class="modal-bg" id="export-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Ekspor Excel</div>
    <div class="form-group">
      <label class="form-label">Tipe Laporan</label>
      <select class="form-select" id="exp-type" onchange="updateExpUI()">
        <option value="harian">Harian — transaksi + pengeluaran</option>
        <option value="mingguan">Mingguan — omset + pengeluaran mingguan</option>
        <option value="bulanan">Bulanan — ringkasan per bulan</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Rentang Tanggal</label>
      <div class="date-row">
        <div><label class="form-label">Dari</label><input type="date" class="dinput" id="exp-from" style="width:100%"></div>
        <div><label class="form-label">Sampai</label><input type="date" class="dinput" id="exp-to" style="width:100%"></div>
      </div>
    </div>
    <button class="exp-btn" id="exp-btn" onclick="doExport()">⬇ Download .xlsx</button>
    <button class="close-btn" onclick="closeExport()">Batal</button>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="setTab('harian',this)">Harian</button>
    <button class="tab" onclick="setTab('mingguan',this)">Mingguan</button>
    <button class="tab" onclick="setTab('bulanan',this)">Bulanan</button>
  </div>

  <div class="frow" id="filter-row"></div>
  <div id="custom-dates" style="display:none;margin-bottom:16px">
    <div style="display:flex;gap:6px;align-items:center">
      <input type="date" class="dinput" id="lap-from" onchange="loadCurrent()">
      <span style="color:var(--muted);font-size:12px">—</span>
      <input type="date" class="dinput" id="lap-to" onchange="loadCurrent()">
    </div>
  </div>

  <!-- Grand summary -->
  <div class="sum-grid" id="sum-main" style="margin-bottom:10px">
    <div class="card"><div class="cbar" style="background:var(--accent)"></div><div class="clabel">Omset</div><div class="cval" id="s-omset" style="color:var(--accent)">—</div></div>
    <div class="card"><div class="cbar" style="background:var(--red)"></div><div class="clabel">Pengeluaran</div><div class="cval" id="s-exp" style="color:var(--red)">—</div></div>
    <div class="card" style="border-color:rgba(74,222,128,0.25);background:rgba(74,222,128,0.04)"><div class="cbar" style="background:var(--saved)"></div><div class="clabel">Total Bersih</div><div class="cval" id="s-saved" style="color:var(--saved)">—</div></div>
  </div>
  <div class="sum-grid-6" id="sum-pay">
    <div class="card"><div class="cbar" style="background:var(--mandiri)"></div><div class="clabel">Mandiri</div><div class="cval" id="s-mandiri" style="color:var(--mandiri)">—</div><div class="csub">QRIS+TF</div></div>
    <div class="card"><div class="cbar" style="background:var(--bca)"></div><div class="clabel">BCA</div><div class="cval" id="s-bca" style="color:var(--bca)">—</div></div>
    <div class="card"><div class="cbar" style="background:var(--cash)"></div><div class="clabel">Cash</div><div class="cval" id="s-cash" style="color:var(--cash)">—</div></div>
    <div class="card"><div class="cbar" style="background:var(--produksi)"></div><div class="clabel">Produksi</div><div class="cval" id="s-prod" style="color:var(--produksi)">—</div></div>
    <div class="card"><div class="cbar" style="background:var(--ops)"></div><div class="clabel">Operasional</div><div class="cval" id="s-ops" style="color:var(--ops)">—</div></div>
    <div class="card"><div class="cbar" style="background:var(--pending)"></div><div class="clabel">Belum cek</div><div class="cval" id="s-pend" style="color:var(--pending)">—</div></div>
  </div>

  <div id="lap-content"><div class="empty"><span class="spin"></span></div></div>
</div>

<script>
const SB='https://rxqkbcabybbwfurzgtwj.supabase.co',KEY='sb_publishable_Z2zFPJYGejuvQgPXz9rgDg_dv2jFt43';
const api=(p,o={})=>fetch(`${SB}/rest/v1/${p}`,{headers:{'apikey':KEY,'Authorization':`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':o.prefer||'return=minimal',...(o.headers||{})}, ...o});
const fmt=n=>(n===null||n===undefined||isNaN(n))?'—':'Rp '+Math.round(n).toLocaleString('id-ID');
const pad=n=>String(n).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

let curTab='harian',curRange='week';
let chartInstance=null,chartExpFilter='all';

function setTab(t,el){curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderFilters();loadCurrent();}
function renderFilters(){
  const row=document.getElementById('filter-row');
  if(curTab==='harian'){row.innerHTML=`<button class="fbtn active" data-r="week" onclick="setRange('week',this)">7 hari</button><button class="fbtn" data-r="month" onclick="setRange('month',this)">30 hari</button><button class="fbtn" data-r="month3" onclick="setRange('month3',this)">3 bulan</button><button class="fbtn" data-r="custom" onclick="setRange('custom',this)">Custom</button>`;}
  else if(curTab==='mingguan'){row.innerHTML=`<button class="fbtn active" data-r="month" onclick="setRange('month',this)">Bulan ini</button><button class="fbtn" data-r="month3" onclick="setRange('month3',this)">3 bulan</button><button class="fbtn" data-r="year" onclick="setRange('year',this)">1 tahun</button><button class="fbtn" data-r="custom" onclick="setRange('custom',this)">Custom</button>`;}
  else{row.innerHTML=`<button class="fbtn active" data-r="year" onclick="setRange('year',this)">Tahun ini</button><button class="fbtn" data-r="custom" onclick="setRange('custom',this)">Custom</button>`;}
  curRange=curTab==='bulanan'?'year':curTab==='mingguan'?'month':'week';
}
function setRange(r,el){curRange=r;document.querySelectorAll('.fbtn[data-r]').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('custom-dates').style.display=r==='custom'?'block':'none';if(r!=='custom')loadCurrent();}
function getRange(){
  const now=new Date();let from=new Date(now);
  if(curRange==='week')from.setDate(now.getDate()-(curTab==='harian'?7:28));
  else if(curRange==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);}
  else if(curRange==='month3')from.setDate(now.getDate()-90);
  else if(curRange==='year'){from=new Date(now.getFullYear(),0,1);}
  else if(curRange==='custom'){const f=document.getElementById('lap-from').value,t=document.getElementById('lap-to').value;if(f&&t)return{from:f,to:t};}
  return{from:fmtD(from),to:fmtD(now)};
}
function loadCurrent(){if(curTab==='harian')loadHarian();else if(curTab==='mingguan')loadMingguan();else loadBulanan();}

// Minggu 1 = tgl 1 s/d Minggu pertama bulan itu
// Minggu 2+ = Senin-Minggu kalender, dipotong di akhir bulan
const weekKey=d=>{
  const dt=new Date(d+'T00:00:00');
  const y=dt.getFullYear(),m=dt.getMonth(),day=dt.getDate();
  // Cari Minggu pertama bulan ini (hari Minggu = 0)
  const firstOfMonth=new Date(y,m,1);
  const firstSunday=firstOfMonth.getDay()===0?1:8-firstOfMonth.getDay();
  if(day<=firstSunday){
    // Masuk minggu 1: key = tgl 1 bulan ini
    return `${y}-${pad(m+1)}-01`;
  }
  // Minggu 2+: cari Senin awal minggu kalender
  const dayOfWeek=dt.getDay()||7; // 1=Sen, 7=Min
  const monday=new Date(dt);monday.setDate(day-dayOfWeek+1);
  // Kalau Senin itu bulan sebelumnya, pakai tgl 1
  if(monday.getMonth()!==m) return `${y}-${pad(m+1)}-01`;
  return `${y}-${pad(m+1)}-${pad(monday.getDate())}`;
};
const monthKey=d=>d.slice(0,7);

function updateSumCards(trxs,exps){
  let omset=0,ongkir=0,mandiri=0,bca=0,cash=0,pend=0,prod=0,ops=0,expTotal=0;
  trxs.forEach(t=>{const h=t.total_harga||0;omset+=h;ongkir+=t.ongkir||0;if(t.metode_bayar==='qris'||t.metode_bayar==='tf_mandiri')mandiri+=h;else if(t.metode_bayar==='bca')bca+=h;else if(t.metode_bayar==='cash')cash+=h;else pend+=h;});
  omset-=ongkir;
  exps.forEach(e=>{expTotal+=e.nominal||0;if(e.kategori==='produksi')prod+=e.nominal||0;else ops+=e.nominal||0;});
  const saved=omset-expTotal;
  document.getElementById('s-omset').textContent=fmt(omset);
  document.getElementById('s-exp').textContent=fmt(expTotal);
  const sv=document.getElementById('s-saved');sv.textContent=fmt(saved);sv.style.color=saved<0?'var(--red)':'var(--saved)';
  document.getElementById('s-mandiri').textContent=fmt(mandiri);
  document.getElementById('s-bca').textContent=fmt(bca);
  document.getElementById('s-cash').textContent=fmt(cash);
  document.getElementById('s-prod').textContent=fmt(prod);
  document.getElementById('s-ops').textContent=fmt(ops);
  document.getElementById('s-pend').textContent=fmt(pend);
  return{omset,expTotal,saved,mandiri,bca,cash};
}

async function loadHarian(){
  const r=getRange();if(!r)return;
  document.getElementById('lap-content').innerHTML='<div class="empty"><span class="spin"></span></div>';
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${r.from}&tanggal=lte.${r.to}&select=tanggal,total_harga,ongkir,metode_bayar&order=tanggal.asc`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${r.from}&tanggal=lte.${r.to}&tipe=eq.harian&select=tanggal,nominal,kategori&order=tanggal.asc`,{method:'GET',prefer:''})
  ]);
  const trxs=await tr.json(),exps=await er.json();
  const tList=Array.isArray(trxs)?trxs:[],eList=Array.isArray(exps)?exps:[];
  updateSumCards(tList,eList);
  const groups={};
  tList.forEach(t=>{const k=t.tanggal;if(!groups[k])groups[k]={t:[],e:[]};groups[k].t.push(t);});
  eList.forEach(e=>{const k=e.tanggal;if(!groups[k])groups[k]={t:[],e:[]};groups[k].e.push(e);});
  const keys=Object.keys(groups).sort().reverse();
  if(!keys.length){document.getElementById('lap-content').innerHTML='<div class="empty">Belum ada data</div>';return;}
  document.getElementById('lap-content').innerHTML=keys.map(k=>renderPeriodCard(k,groups[k].t,groups[k].e,'harian')).join('');
}

async function loadMingguan(){
  const r=getRange();if(!r)return;
  document.getElementById('lap-content').innerHTML='<div class="empty"><span class="spin"></span></div>';
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${r.from}&tanggal=lte.${r.to}&select=tanggal,total_harga,ongkir,metode_bayar&order=tanggal.asc`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${r.from}&tanggal=lte.${r.to}&select=tanggal,nominal,kategori,tipe&order=tanggal.asc`,{method:'GET',prefer:''})
  ]);
  const trxs=await tr.json(),exps=await er.json();
  const tList=Array.isArray(trxs)?trxs:[],eList=Array.isArray(exps)?exps:[];
  updateSumCards(tList,eList);
  const groups={};
  tList.forEach(t=>{const k=weekKey(t.tanggal);if(!groups[k])groups[k]={t:[],e:[]};groups[k].t.push(t);});
  eList.forEach(e=>{const k=weekKey(e.tanggal);if(!groups[k])groups[k]={t:[],e:[]};groups[k].e.push(e);});
  const keys=Object.keys(groups).sort().reverse();
  if(!keys.length){document.getElementById('lap-content').innerHTML='<div class="empty">Belum ada data</div>';return;}
  document.getElementById('lap-content').innerHTML=keys.map(k=>renderPeriodCard(k,groups[k].t,groups[k].e,'mingguan')).join('');
}

function renderPeriodCard(k,ts,es,type){
  let total=0,ongkir=0,mandiri=0,bca=0,cash=0,pend=0;
  ts.forEach(t=>{const h=t.total_harga||0;total+=h;ongkir+=t.ongkir||0;if(t.metode_bayar==='qris'||t.metode_bayar==='tf_mandiri')mandiri+=h;else if(t.metode_bayar==='bca')bca+=h;else if(t.metode_bayar==='cash')cash+=h;else pend+=h;});
  const omset=total-ongkir;
  let expH=0,expW=0;
  es.forEach(e=>{if(e.tipe==='mingguan')expW+=e.nominal||0;else expH+=e.nominal||0;});
  const expTotal=expH+expW,saved=omset-expTotal;
  let label,sub;
  if(type==='harian'){const d=new Date(k+'T00:00:00');label=d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});sub=ts.length+' transaksi';}
  else{
    const startD=new Date(k+'T00:00:00');
    const wy=startD.getFullYear(),wm=startD.getMonth(),startDay=startD.getDate();
    const lastDay=new Date(wy,wm+1,0).getDate();
    // Hitung end of week: kalau minggu 1 (startDay==1), end = Minggu pertama bulan itu
    // Kalau minggu lain, end = Minggu (startDay+6) atau akhir bulan
    let endDay;
    if(startDay===1){
      // Minggu pertama: dari tgl 1 sampai Minggu pertama bulan ini
      const firstSunday=startD.getDay()===0?1:8-startD.getDay();
      endDay=Math.min(firstSunday,lastDay);
    }else{
      endDay=Math.min(startDay+6,lastDay);
    }
    const endD=new Date(wy,wm,endDay);
    // Hitung nomor minggu
    const firstOfMonth=new Date(wy,wm,1);
    const firstSunday2=firstOfMonth.getDay()===0?1:8-firstOfMonth.getDay();
    let weekNum;
    if(startDay===1) weekNum=1;
    else weekNum=1+Math.ceil((startDay-firstSunday2)/7);
    const wo={day:'numeric',month:'short'};
    label='Minggu '+weekNum+' — '+startD.toLocaleDateString('id-ID',wo)+' s/d '+endD.toLocaleDateString('id-ID',wo);
    sub=ts.length+' transaksi · '+es.length+' pengeluaran';
  }
  return`<div class="period-card">
    <div class="period-header"><div><div class="period-label">${label}</div><div class="period-sub">${sub}</div></div><div class="period-saved ${saved<0?'neg':'pos'}">${fmt(saved)}</div></div>
    <div class="prow"><span class="prow-label">Total penjualan</span><span class="prow-val">${fmt(total)}</span></div>
    <div class="prow"><span class="prow-label">Ongkir</span><span class="prow-val" style="color:var(--pending)">−${fmt(ongkir)}</span></div>
    <div class="prow"><span class="prow-label">Omset</span><span class="prow-val" style="color:var(--green)">${fmt(omset)}</span></div>
    <div class="prow"><span class="prow-label">Pengeluaran harian</span><span class="prow-val" style="color:var(--red)">−${fmt(expH)}</span></div>
    ${expW?`<div class="prow"><span class="prow-label">Pengeluaran mingguan</span><span class="prow-val" style="color:var(--red)">−${fmt(expW)}</span></div>`:''}
    <div class="prow bold-row"><span class="prow-label">Omset bersih</span><span class="prow-val" style="color:${saved<0?'var(--red)':'var(--saved)'}">${fmt(saved)}</span></div>
    <div class="pay-bd">
      ${mandiri?`<div class="pay-chip"><div class="pay-dot" style="background:var(--mandiri)"></div><span style="color:var(--muted)">Mandiri</span>&nbsp;<span style="color:var(--mandiri)">${fmt(mandiri)}</span></div>`:''}
      ${bca?`<div class="pay-chip"><div class="pay-dot" style="background:var(--bca)"></div><span style="color:var(--muted)">BCA</span>&nbsp;<span style="color:var(--bca)">${fmt(bca)}</span></div>`:''}
      ${cash?`<div class="pay-chip"><div class="pay-dot" style="background:var(--cash)"></div><span style="color:var(--muted)">Cash</span>&nbsp;<span style="color:var(--cash)">${fmt(cash)}</span></div>`:''}
      ${pend?`<div class="pay-chip"><div class="pay-dot" style="background:var(--pending)"></div><span style="color:var(--muted)">Belum cek</span>&nbsp;<span style="color:var(--pending)">${fmt(pend)}</span></div>`:''}
    </div>
  </div>`;
}

// ---- BULANAN ----
async function loadBulanan(){
  const r=getRange();if(!r)return;
  document.getElementById('lap-content').innerHTML='<div class="empty"><span class="spin"></span></div>';
  const year=r.from.slice(0,4);
  const yearFrom=`${year}-01-01`,yearTo=`${year}-12-31`;
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${yearFrom}&tanggal=lte.${yearTo}&select=tanggal,total_harga,ongkir,metode_bayar&order=tanggal.asc`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${yearFrom}&tanggal=lte.${yearTo}&select=tanggal,nominal,kategori,tipe&order=tanggal.asc`,{method:'GET',prefer:''})
  ]);
  const tAll=await tr.json(),eAll=await er.json();
  const tList=Array.isArray(tAll)?tAll:[],eList=Array.isArray(eAll)?eAll:[];

  // Current month cards
  const nowMonth=new Date().toISOString().slice(0,7);
  const tMonth=tList.filter(t=>t.tanggal.slice(0,7)===nowMonth);
  const eMonth=eList.filter(e=>e.tanggal.slice(0,7)===nowMonth);
  updateSumCards(tMonth,eMonth);

  // Year aggregates for sidebar
  let yOmset=0,yExp=0;
  tList.forEach(t=>{yOmset+=(t.total_harga||0)-(t.ongkir||0);});
  eList.forEach(e=>{yExp+=e.nominal||0;});

  // Monthly groups for chart
  const months={};
  for(let m=1;m<=12;m++){const k=`${year}-${pad(m)}`;months[k]={omset:0,exp:0,prod:0,ops:0};}
  tList.forEach(t=>{const k=t.tanggal.slice(0,7);if(!months[k])return;months[k].omset+=(t.total_harga||0)-(t.ongkir||0);});
  eList.forEach(e=>{const k=e.tanggal.slice(0,7);if(!months[k])return;months[k].exp+=e.nominal||0;if(e.kategori==='produksi')months[k].prod+=e.nominal||0;else months[k].ops+=e.nominal||0;});

  const monthLabels=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  const keys=Object.keys(months).sort();

  document.getElementById('lap-content').innerHTML=`
    <div class="monthly-layout">
      <div>
        <div class="chart-section">
          <div class="chart-title">
            <span>Grafik tahunan ${year}</span>
            <div class="chart-filter">
              <button class="cf active" id="cf-all" onclick="setChartFilter('all')">Semua</button>
              <button class="cf" id="cf-prod" onclick="setChartFilter('produksi')">Produksi</button>
              <button class="cf" id="cf-ops" onclick="setChartFilter('operasional')">Operasional</button>
            </div>
          </div>
          <canvas id="yearChart"></canvas>
        </div>
      </div>
      <div class="year-sidebar">
        <div class="year-card"><div class="year-card-label">Omset ${year}</div><div class="year-card-val" style="color:var(--accent)">${fmt(yOmset)}</div></div>
        <div class="year-card"><div class="year-card-label">Pengeluaran ${year}</div><div class="year-card-val" style="color:var(--red)">${fmt(yExp)}</div></div>
        <div class="year-card" style="border-color:rgba(74,222,128,0.25);background:rgba(74,222,128,0.04)"><div class="year-card-label">Bersih ${year}</div><div class="year-card-val" style="color:${yOmset-yExp<0?'var(--red)':'var(--saved)'}">${fmt(yOmset-yExp)}</div></div>
      </div>
    </div>`;

  // Build chart
  window._monthData={keys,months,monthLabels};
  buildChart('all');
}

function setChartFilter(f){
  chartExpFilter=f;
  document.querySelectorAll('.cf').forEach(b=>b.classList.remove('active'));
  document.getElementById('cf-'+f).classList.add('active');
  buildChart(f);
}

function buildChart(f){
  if(!window._monthData)return;
  const{keys,months,monthLabels}=window._monthData;
  const omsetData=keys.map(k=>Math.round(months[k].omset/1000));
  const expData=keys.map(k=>{if(f==='produksi')return Math.round(months[k].prod/1000);if(f==='operasional')return Math.round(months[k].ops/1000);return Math.round(months[k].exp/1000);});
  const savedData=keys.map(k=>Math.round((months[k].omset-months[k].exp)/1000));
  const labels=keys.map(k=>{const m=parseInt(k.split('-')[1])-1;return monthLabels[m];});
  if(chartInstance)chartInstance.destroy();
  const ctx=document.getElementById('yearChart').getContext('2d');
  chartInstance=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Omset (rb)',data:omsetData,backgroundColor:'rgba(245,200,66,0.5)',borderColor:'#f5c842',borderWidth:1,borderRadius:3},
    {label:'Pengeluaran (rb)',data:expData,backgroundColor:'rgba(248,113,113,0.4)',borderColor:'#f87171',borderWidth:1,borderRadius:3},
    {label:'Bersih (rb)',data:savedData,type:'line',borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,0.1)',borderWidth:2,pointRadius:3,fill:true,tension:0.3}
  ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#777',font:{size:10,family:'DM Mono'}}}},scales:{x:{ticks:{color:'#777',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#777',font:{size:10},callback:v=>v+'rb'},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

// ---- EXPORT ----
function openExport(){
  const now=new Date(),y=now.getFullYear(),m=pad(now.getMonth()+1);
  document.getElementById('exp-from').value=`${y}-${m}-01`;
  document.getElementById('exp-to').value=`${y}-${m}-${pad(new Date(y,now.getMonth()+1,0).getDate())}`;
  document.getElementById('export-modal').style.display='flex';
}
function closeExport(){document.getElementById('export-modal').style.display='none';}

async function doExport(){
  const btn=document.getElementById('exp-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Memuat data...';
  const type=document.getElementById('exp-type').value;
  const from=document.getElementById('exp-from').value,to=document.getElementById('exp-to').value;
  if(!from||!to){btn.disabled=false;btn.innerHTML='⬇ Download .xlsx';return;}
  try{
    if(type==='harian') await exportHarian(from,to);
    else if(type==='mingguan') await exportMingguan(from,to);
    else await exportBulanan(from,to);
  }finally{btn.disabled=false;btn.innerHTML='⬇ Download .xlsx';}
}

async function exportHarian(from,to){
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${from}&tanggal=lte.${to}&order=tanggal.asc,waktu.asc&select=*`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${from}&tanggal=lte.${to}&order=tanggal.asc&select=*`,{method:'GET',prefer:''})
  ]);
  const trxs=await tr.json(),exps=await er.json();
  const wb=XLSX.utils.book_new();
  // Sheet 1: Transaksi
  const trxRows=[['ID','Nama','Total','Ongkir','Omset','Metode Bayar','Tanggal','Waktu']];
  (Array.isArray(trxs)?trxs:[]).forEach(t=>trxRows.push([t.trx_id,t.nama_pembeli,t.total_harga,t.ongkir,(t.total_harga||0)-(t.ongkir||0),t.metode_bayar,t.tanggal,t.waktu?.slice(0,5)]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(trxRows),'Transaksi');
  // Sheet 2: Pengeluaran
  const expRows=[['ID','Nama','Nominal','Kategori','Metode','Tipe','Catatan','Tanggal']];
  (Array.isArray(exps)?exps:[]).forEach(e=>expRows.push([e.expense_id,e.nama,e.nominal,e.kategori,e.metode_bayar,e.tipe,e.catatan,e.tanggal]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(expRows),'Pengeluaran');
  // Sheet 3: Summary per hari
  const sumRows=[['Tanggal','Total Penjualan','Ongkir','Omset','Pengeluaran','Omset Bersih']];
  const groups={};
  (Array.isArray(trxs)?trxs:[]).forEach(t=>{if(!groups[t.tanggal])groups[t.tanggal]={total:0,ongkir:0,exp:0};groups[t.tanggal].total+=t.total_harga||0;groups[t.tanggal].ongkir+=t.ongkir||0;});
  (Array.isArray(exps)?exps:[]).forEach(e=>{if(!groups[e.tanggal])groups[e.tanggal]={total:0,ongkir:0,exp:0};groups[e.tanggal].exp+=e.nominal||0;});
  Object.keys(groups).sort().forEach(k=>{const g=groups[k];const om=g.total-g.ongkir;sumRows.push([k,g.total,g.ongkir,om,g.exp,om-g.exp]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumRows),'Ringkasan Harian');
  XLSX.writeFile(wb,`laporan_harian_${from}_${to}.xlsx`);
}

async function exportMingguan(from,to){
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${from}&tanggal=lte.${to}&select=tanggal,total_harga,ongkir,metode_bayar&order=tanggal.asc`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${from}&tanggal=lte.${to}&select=tanggal,nominal,kategori,tipe&order=tanggal.asc`,{method:'GET',prefer:''})
  ]);
  const tList=await tr.json(),eList=await er.json();
  const groups={};
  (Array.isArray(tList)?tList:[]).forEach(t=>{const k=weekKey(t.tanggal);if(!groups[k])groups[k]={omset:0,expH:0,expW:0,mandiri:0,bca:0,cash:0};groups[k].omset+=(t.total_harga||0)-(t.ongkir||0);if(t.metode_bayar==='qris'||t.metode_bayar==='tf_mandiri')groups[k].mandiri+=t.total_harga||0;else if(t.metode_bayar==='bca')groups[k].bca+=t.total_harga||0;else if(t.metode_bayar==='cash')groups[k].cash+=t.total_harga||0;});
  (Array.isArray(eList)?eList:[]).forEach(e=>{const k=weekKey(e.tanggal);if(!groups[k])groups[k]={omset:0,expH:0,expW:0,mandiri:0,bca:0,cash:0};if(e.tipe==='mingguan')groups[k].expW+=e.nominal||0;else groups[k].expH+=e.nominal||0;});
  const wb=XLSX.utils.book_new();
  const rows=[['Minggu (mulai tgl)','Omset','Pengeluaran Harian','Pengeluaran Mingguan','Total Pengeluaran','Omset Bersih','Mandiri','BCA','Cash']];
  Object.keys(groups).sort().forEach(k=>{
    const g=groups[k];const exp=g.expH+g.expW;
    const sd=new Date(k+'T00:00:00'),sy=sd.getFullYear(),sm=sd.getMonth(),sday=sd.getDate();
    const lastDay=new Date(sy,sm+1,0).getDate();
    const firstOfMonth=new Date(sy,sm,1);
    const firstSunday=firstOfMonth.getDay()===0?1:8-firstOfMonth.getDay();
    let eday;
    if(sday===1){eday=Math.min(firstSunday,lastDay);}
    else{eday=Math.min(sday+6,lastDay);}
    const ed=new Date(sy,sm,eday);
    let wn;
    if(sday===1)wn=1;
    else wn=1+Math.ceil((sday-firstSunday)/7);
    const wo={day:'numeric',month:'short'};
    const rangeLabel='Minggu '+wn+' ('+sd.toLocaleDateString('id-ID',wo)+' s/d '+ed.toLocaleDateString('id-ID',wo)+')';
    rows.push([rangeLabel,g.omset,g.expH,g.expW,exp,g.omset-exp,g.mandiri,g.bca,g.cash]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'Laporan Mingguan');
  XLSX.writeFile(wb,`laporan_mingguan_${from}_${to}.xlsx`);
}

async function exportBulanan(from,to){
  const[tr,er]=await Promise.all([
    api(`transaksi?tanggal=gte.${from}&tanggal=lte.${to}&select=tanggal,total_harga,ongkir,metode_bayar&order=tanggal.asc`,{method:'GET',prefer:''}),
    api(`pengeluaran?tanggal=gte.${from}&tanggal=lte.${to}&select=tanggal,nominal,kategori&order=tanggal.asc`,{method:'GET',prefer:''})
  ]);
  const tList=await tr.json(),eList=await er.json();
  const groups={};
  (Array.isArray(tList)?tList:[]).forEach(t=>{const k=monthKey(t.tanggal);if(!groups[k])groups[k]={omset:0,exp:0,prod:0,ops:0};groups[k].omset+=(t.total_harga||0)-(t.ongkir||0);});
  (Array.isArray(eList)?eList:[]).forEach(e=>{const k=monthKey(e.tanggal);if(!groups[k])groups[k]={omset:0,exp:0,prod:0,ops:0};groups[k].exp+=e.nominal||0;if(e.kategori==='produksi')groups[k].prod+=e.nominal||0;else groups[k].ops+=e.nominal||0;});
  const wb=XLSX.utils.book_new();
  const rows=[['Bulan','Omset','Total Pengeluaran','Produksi','Operasional','Omset Bersih']];
  Object.keys(groups).sort().forEach(k=>{const g=groups[k];rows.push([k,g.omset,g.exp,g.prod,g.ops,g.omset-g.exp]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'Laporan Bulanan');
  XLSX.writeFile(wb,`laporan_bulanan_${from}_${to}.xlsx`);
}
